    :root {
        --primary-purple: #7c3aed;
        --dark-purple: #4c1d95;
        --light-purple: #a78bfa;
        --gold: #fbbf24;
        --dark-bg: #0a0a0f;
        --card-bg: rgba(15, 15, 25, 0.95);
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark-bg);
        color: #e9d5ff;
        overflow-x: hidden;
        position: relative;
        min-height: 100vh;
    }

    /* Animated Background */
    .cosmic-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(ellipse at center, #1a0f2e 0%, #0a0a0f 100%);
        overflow: hidden;
    }

    .stars {
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: 
            radial-gradient(2px 2px at 20% 30%, white, transparent),
            radial-gradient(2px 2px at 40% 70%, white, transparent),
            radial-gradient(1px 1px at 50% 50%, white, transparent),
            radial-gradient(1px 1px at 80% 10%, white, transparent);
        background-size: 50% 50%;
        animation: stars-rotate 200s linear infinite;
    }

    .nebula {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 70% 30%, rgba(147, 112, 219, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 30% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        animation: nebula-drift 60s ease-in-out infinite;
    }

    @keyframes stars-rotate {
        from { transform: rotate(0deg) translateX(-50%); }
        to { transform: rotate(360deg) translateX(-50%); }
    }

    @keyframes nebula-drift {
        0%, 100% { transform: scale(1) translate(0, 0); }
        33% { transform: scale(1.1) translate(10px, -10px); }
        66% { transform: scale(0.9) translate(-10px, 10px); }
    }

    /* Energy Particles */
    .particle {
        position: absolute;
        background: var(--gold);
        border-radius: 50%;
        pointer-events: none;
        animation: particle-float 8s infinite ease-in-out;
    }

    @keyframes particle-float {
        0%, 100% { 
            transform: translateY(0) translateX(0) scale(1);
            opacity: 0;
        }
        10% { opacity: 1; }
        90% { opacity: 1; }
        50% { 
            transform: translateY(-100vh) translateX(50px) scale(0.5);
        }
    }

    /* Header */
    .header {
        background: linear-gradient(180deg, rgba(15, 15, 25, 0.98) 0%, rgba(15, 15, 25, 0.95) 100%);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(147, 112, 219, 0.3);
        position: sticky;
        top: 0;
        z-index: 100;
        animation: header-glow 3s ease-in-out infinite;
    }

    @keyframes header-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(147, 112, 219, 0.2); }
        50% { box-shadow: 0 0 40px rgba(147, 112, 219, 0.4), 0 0 60px rgba(139, 92, 246, 0.2); }
    }

    .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo-section {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .logo {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, var(--primary-purple) 0%, var(--gold) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: logo-spin 20s linear infinite;
        box-shadow: 0 0 30px rgba(147, 112, 219, 0.5);
    }

    @keyframes logo-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .logo-text {
        font-size: 1.75rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--light-purple) 0%, var(--gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(147, 112, 219, 0.5);
    }

    /* Main Container */
    .main-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
        position: relative;
    }

    /* Streaming Interface */
    .stream-section {
        margin-bottom: 3rem;
        animation: fade-in-up 0.8s ease-out;
    }

    @keyframes fade-in-up {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .stream-card {
        background: var(--card-bg);
        border: 1px solid rgba(147, 112, 219, 0.3);
        border-radius: 20px;
        padding: 2rem;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .stream-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(147, 112, 219, 0.3);
        border-color: rgba(147, 112, 219, 0.5);
    }

    .stream-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(147, 112, 219, 0.1) 0%, transparent 70%);
        animation: pulse-bg 4s ease-in-out infinite;
    }

    @keyframes pulse-bg {
        0%, 100% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(1.1) rotate(180deg); }
    }

    .stream-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        position: relative;
        z-index: 1;
    }

    .stream-title {
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .status-indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #10b981;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 20px #10b981;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.2); opacity: 0.8; }
    }

    .stream-content {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 1.5rem;
        min-height: 200px;
        max-height: 400px;
        overflow-y: auto;
        position: relative;
        z-index: 1;
        border: 1px solid rgba(147, 112, 219, 0.2);
    }

    .stream-message {
        margin-bottom: 1rem;
        padding: 1rem;
        background: rgba(147, 112, 219, 0.1);
        border-radius: 8px;
        border-left: 3px solid var(--primary-purple);
        animation: message-appear 0.5s ease-out;
    }

    @keyframes message-appear {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    /* App Container */
    .app-section {
        animation: fade-in-up 0.8s ease-out 0.3s both;
    }

    .app-card {
        background: var(--card-bg);
        border: 1px solid rgba(147, 112, 219, 0.3);
        border-radius: 20px;
        padding: 2rem;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        min-height: 600px;
    }

    .app-frame {
        width: 100%;
        height: 800px;
        border: none;
        border-radius: 12px;
        background: #0a0a0f;
    }

    /* Connection Controls */
    .controls {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }

    .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary-purple) 0%, var(--dark-purple) 100%);
        color: white;
        box-shadow: 0 5px 20px rgba(147, 112, 219, 0.3);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(147, 112, 219, 0.5);
    }

    .btn-secondary {
        background: rgba(147, 112, 219, 0.1);
        color: var(--light-purple);
        border: 1px solid rgba(147, 112, 219, 0.3);
    }

    .btn-secondary:hover {
        background: rgba(147, 112, 219, 0.2);
        border-color: rgba(147, 112, 219, 0.5);
    }

    .btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn:active::after {
        width: 300px;
        height: 300px;
    }

    /* Input Field */
    .input-group {
        flex: 1;
        position: relative;
    }

    .input-field {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(147, 112, 219, 0.3);
        border-radius: 10px;
        color: white;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .input-field:focus {
        outline: none;
        border-color: var(--primary-purple);
        box-shadow: 0 0 20px rgba(147, 112, 219, 0.3);
    }

    /* Special Effects */
    .glow-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(147, 112, 219, 0.3) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(40px);
        animation: orb-float 10s ease-in-out infinite;
        pointer-events: none;
    }

    @keyframes orb-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(100px, -100px) scale(1.2); }
        66% { transform: translate(-100px, 50px) scale(0.8); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .header-content {
            padding: 1rem;
        }
        
        .logo-text {
            font-size: 1.25rem;
        }
        
        .main-container {
            padding: 1rem;
        }
        
        .app-frame {
            height: 600px;
        }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
        width: 10px;
    }

    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--primary-purple) 0%, var(--dark-purple) 100%);
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--light-purple);
    }

    /* Loading Animation */
    .loader {
        display: none;
        width: 50px;
        height: 50px;
        border: 3px solid rgba(147, 112, 219, 0.3);
        border-top-color: var(--primary-purple);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 2rem auto;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loading .loader {
        display: block;
    }

    .loading .app-frame {
        display: none;
    }
</style>

<script>
    // Particle Generation
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = '100%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 5 + 8) + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // Initialize particles
    createParticles();

    // Streaming functionality
    let eventSource = null;
    const streamOutput = document.getElementById('stream-output');
    const connectionStatus = document.getElementById('connection-status');
    const apiEndpoint = document.getElementById('api-endpoint');

    function connectStream() {
        const endpoint = apiEndpoint.value || '/stream';
        
        if (eventSource) {
            eventSource.close();
        }

        try {
            eventSource = new EventSource(endpoint);
            
            eventSource.onopen = () => {
                connectionStatus.textContent = '● Connected';
                connectionStatus.style.color = '#10b981';
                addStreamMessage('Connected to streaming endpoint.', 'success');
            };

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addStreamMessage(data.message || data, 'info');
                
                // If the message contains app data, update the iframe
                if (data.type === 'app-update' && data.content) {
                    updateApp(data.content);
                }
            };

            eventSource.onerror = () => {
                connectionStatus.textContent = '● Disconnected';
                connectionStatus.style.color = '#ef4444';
                addStreamMessage('Connection lost. Attempting to reconnect...', 'error');
            };
        } catch (error) {
            addStreamMessage('Failed to connect: ' + error.message, 'error');
        }
    }

    function addStreamMessage(message, type = 'info') {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'stream-message';
        messageDiv.style.borderLeftColor = type === 'error' ? '#ef4444' : 
                                          type === 'success' ? '#10b981' : 
                                          '#8b5cf6';
        
        const timestamp = new Date().toLocaleTimeString();
        messageDiv.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
        
        streamOutput.appendChild(messageDiv);
        streamOutput.scrollTop = streamOutput.scrollHeight;
        
        // Keep only last 50 messages
        while (streamOutput.children.length > 50) {
            streamOutput.removeChild(streamOutput.firstChild);
        }
    }

    function clearStream() {
        streamOutput.innerHTML = '<div class="stream-message">Stream cleared.</div>';
    }

    function updateApp(content) {
        const iframe = document.getElementById('astrology-app');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(content);
        iframeDoc.close();
    }

    // Load the astrology app
    function loadAstrologyApp() {
        const appContainer = document.getElementById('app-container');
        const iframe = document.getElementById('astrology-app');
        
        // Here you would normally load your React app
        // For now, we'll show a placeholder
        setTimeout(() => {
            appContainer.classList.remove('loading');
            iframe.srcdoc = `
                <html>
                <head>
                    <style>
                        body {
                            margin: 0;
                            background: #0a0a0f;
                            color: #e9d5ff;
                            font-family: sans-serif;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            height: 100vh;
                            text-align: center;
                        }
                        .placeholder {
                            padding: 2rem;
                        }
                        h2 {
                            background: linear-gradient(135deg, #a78bfa 0%, #fbbf24 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            margin-bottom: 1rem;
                        }
                    </style>
                </head>
                <body>
                    <div class="placeholder">
                        <h2>Celestial Oracle Engine</h2>
                        <p>Your React astrology app will be loaded here.</p>
                        <p>Use the streaming interface above to receive real-time updates.</p>
                    </div>
                </body>
                </html>
            `;
        }, 1500);
    }

    // Initialize app on load
    window.addEventListener('load', loadAstrologyApp);

    // Optional: WebSocket connection for bi-directional communication
    function connectWebSocket() {
        const ws = new WebSocket('ws://localhost:8080');
        
        ws.onopen = () => {
            console.log('WebSocket connected');
            addStreamMessage('WebSocket connection established', 'success');
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addStreamMessage(data.message, 'info');
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            addStreamMessage('WebSocket error occurred', 'error');
        };
        
        return ws;
    }

    // Mouse trail effect
    document.addEventListener('mousemove', (e) => {
        const orbs = document.querySelectorAll('.glow-orb');
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        
        orbs.forEach((orb, index) => {
            const speed = (index + 1) * 0.01;
            orb.style.transform = `translate(${x * 50 * (index + 1)}px, ${y * 50 * (index + 1)}px)`;
        });
    });
</script>
