<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology 2.0 - Consciousness-Driven Computing | HackFate</title>
    <meta name="description" content="Advanced Astrology 2.0 with Holographic Memory, Behavioral Avatars, and Quantum-Classical Hybrid Processing" />
    <meta name="keywords" content="astrology, consciousness, holographic memory, behavioral avatar, hackfate, quantum computing" />
    <meta name="author" content="HackFate Research" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Astrology 2.0 - Consciousness-Driven Computing" />
    <meta property="og:description" content="Experience cutting-edge astrology with holographic memory systems and behavioral avatar technology" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hackfate.us" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/src/main.tsx" as="script" />
    
    <style>
      /* Critical CSS for loading state */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
        color: white;
        overflow-x: hidden;
      }
      
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-content {
        text-align: center;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-content">
        <div style="width: 64px; height: 64px; margin: 0 auto 20px; border: 3px solid #8b5cf6; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h1 style="font-size: 2rem; margin-bottom: 10px;">Astrology 2.0</h1>
        <p style="opacity: 0.8;">Initializing Consciousness Matrix...</p>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide loading screen when React app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
        }, 1000);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
